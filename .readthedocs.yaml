# Read the Docs configuration for socialverse.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py
  # notebooks are pre-executed; keep warnings visible but non-fatal for hosting
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
