name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build the English site (root)
        # notebooks render from committed outputs (nb_execution_mode="off")
        run: sphinx-build -b html -j auto docs site

      - name: Build the Chinese site (/zh/)
        run: sphinx-build -b html -j auto docs_zh site/zh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # only publish from the default branch; PRs get the build check above
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
